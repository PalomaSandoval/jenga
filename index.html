<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jenga de la Calidad - Cámara Libre</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .legend { background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 1px solid #f1c40f; pointer-events: auto; }
        #game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(231, 76, 60, 0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        button { width: 150px; padding: 10px; margin-top: 20px; cursor: pointer; border-radius: 5px; border: none; background: white; color: #333; font-weight: bold; }
        #controls-hint { position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Jenga de la Calidad</h1>
        <div class="legend">
            <p>🔴 CMMI | 🟡 Moprosoft | 🔵 PSP | 🟢 TSP</p>
            <p>Piezas fuera: <span id="score">0</span></p>
        </div>
    </div>

    <div id="controls-hint">
        Click Izq: Girar | Click Derecho o Shift+Click: Mover vista | Ruedita: Zoom
    </div>

    <div id="game-over">
        <h1>¡LA TORRE SE CAYÓ!</h1>
        <button onclick="location.reload()">Reiniciar</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const temas = [{n:"CMMI", c:0xe74c3c}, {n:"Moprosoft", c:0xf1c40f}, {n:"PSP", c:0x3498db}, {n:"TSP", c:0x2ecc71}];
        let scene, camera, renderer, controls, raycaster, mouse;
        let torre = [];
        let score = 0;
        let perdido = false;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // CONFIGURACIÓN DE CÁMARA MEJORADA
            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.enablePan = true; // ESTO PERMITE MOVER LA VISTA (DERECHO O SHIFT+IZQ)
            controls.screenSpacePanning = true; // Facilita el movimiento vertical/horizontal
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.PointLight(0xffffff, 1.5);
            sun.position.set(10, 25, 10);
            scene.add(sun);

            const geo = new THREE.BoxGeometry(3, 0.85, 1); 

            for (let f = 0; f < 15; f++) {
                let pisoBloques = [];
                for (let i = 0; i < 3; i++) {
                    const t = temas[Math.floor(Math.random()*4)];
                    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: t.c }));
                    const edges = new THREE.EdgesGeometry(geo);
                    const line = new THREE.LineSegments(
                        edges, 
                        new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }) // Contorno negro
                    );
                    mesh.add(line); 
                    const offset = (i - 1) * 1.05;
                    
                    if (f % 2 === 0) mesh.position.set(0, f * 0.9, offset);
                    else { mesh.position.set(offset, f * 0.9, 0); mesh.rotation.y = Math.PI/2; }
                    
                    mesh.userData = { piso: f, index: i, puchones: 0, activo: true, axis: (f % 2 === 0 ? 'x' : 'z') };
                    scene.add(mesh);
                    pisoBloques.push(mesh);
                }
                torre.push(pisoBloques);
            }

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            // Usamos pointerdown para no entrar en conflicto con el arrastre de cámara
            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        let pointerPos = new THREE.Vector2();

        function onPointerDown(e) {
            if (perdido || e.button !== 0) return; // Solo clic izquierdo para empujar
            
            pointerPos.x = e.clientX;
            pointerPos.y = e.clientY;

            // Al soltar el mouse, si no se movió mucho (no fue un giro de cámara), es un "push"
            const onPointerUp = (eUp) => {
                const moveDist = Math.hypot(eUp.clientX - pointerPos.x, eUp.clientY - pointerPos.y);
                if (moveDist < 5) {
                    processClick(eUp);
                }
                window.removeEventListener('pointerup', onPointerUp);
            };
            window.addEventListener('pointerup', onPointerUp);
        }

        function processClick(e) {
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            
            const hits = raycaster.intersectObjects(torre.flat());
            if (hits.length > 0) {
                empujar(hits[0].object);
            }
        }

        function empujar(obj) {
            const pushDist = 0.25; 
            if (obj.userData.axis === 'x') obj.position.x += pushDist;
            else obj.position.z += pushDist;

            obj.userData.puchones++;

            if (obj.userData.puchones >= 6) {
                obj.visible = false;
                obj.userData.activo = false;
                score++;
                document.getElementById('score').innerText = score;
                validarEstabilidad();
            }
        }

        function validarEstabilidad() {
            for (let f = 0; f < torre.length - 1; f++) {
                const bloquesPiso = torre[f];
                const activos = bloquesPiso.filter(b => b.userData.activo).length;
                const centro = bloquesPiso[1].userData.activo;
                if (activos === 0 || (activos === 1 && !centro)) {
                    derrumbe(f);
                    break;
                }
            }
        }

        function derrumbe(pisoFalla) {
            perdido = true;
            document.getElementById('game-over').style.display = 'flex';
            for (let f = pisoFalla; f < torre.length; f++) {
                torre[f].forEach(b => {
                    b.position.y -= 15;
                    b.rotation.x += 0.7;
                });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
