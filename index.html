<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jenga de la Calidad - Modo Desafío</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111; color: white; }
        #ui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        .legend { background: rgba(0,0,0,0.85); padding: 15px; border-radius: 10px; border: 1px solid #f1c40f; pointer-events: auto; }
        #game-over { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(231, 76, 60, 0.9); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 200; }
        button { width: 150px; padding: 10px; margin-top: 20px; cursor: pointer; border-radius: 5px; border: none; background: white; color: #333; font-weight: bold; }
        #controls-hint { position: absolute; bottom: 20px; left: 20px; color: #888; font-size: 12px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Jenga de la Calidad</h1>
        <div class="legend">
            <p>🔴 CMMI | 🟡 Moprosoft | 🔵 PSP | 🟢 TSP</p>
            <p>Piezas fuera: <span id="score">0</span></p>
        </div>
    </div>

    <div id="controls-hint">
        Click Izq: Arrastrar | ⚠️ ¡Cuidado! Algunas piezas están muy apretadas | Click Derecho: Cámara
    </div>

    <div id="game-over">
        <h1>¡LA TORRE SE CAYÓ!</h1>
        <button onclick="location.reload()">Reiniciar</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const temas = [{n:"CMMI", c:0xe74c3c}, {n:"Moprosoft", c:0xf1c40f}, {n:"PSP", c:0x3498db}, {n:"TSP", c:0x2ecc71}];
        let scene, camera, renderer, controls, raycaster, mouse;
        let torre = [];
        let score = 0;
        let perdido = false;
        let piezaSeleccionada = null;
        let planoInterseccion = new THREE.Plane();
        let offsetArrastre = new THREE.Vector3();
        let posicionInicialPieza = new THREE.Vector3();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            controls = new OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true; 
            controls.dampingFactor = 0.05;
            controls.mouseButtons = { LEFT: null, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.ROTATE };

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.PointLight(0xffffff, 1.5);
            sun.position.set(10, 25, 10);
            scene.add(sun);

            const geo = new THREE.BoxGeometry(3, 0.85, 1); 

            for (let f = 0; f < 15; f++) {
                let pisoBloques = [];
                for (let i = 0; i < 3; i++) {
                    const t = temas[Math.floor(Math.random()*4)];
                    const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: t.c }));   
                    const edges = new THREE.EdgesGeometry(geo);
                    // El color del contorno de las piezas BLANCO: 0xffffff NEGRO: 0x000000
                    const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff })); 
                    line.raycast = () => {}; 
                    mesh.add(line); 
                    const offset = (i - 1) * 1.05;
                    if (f % 2 === 0) mesh.position.set(0, f * 0.9, offset);
                    else { mesh.position.set(offset, f * 0.9, 0); mesh.rotation.y = Math.PI/2; }

                    // Aqui es para que algunas piezas random sean mas pesadas
                    const friccion = Math.random() * (0.9 - 0.05) + 0.05;
                    mesh.userData = { 
                        piso: f, 
                        activo: true, 
                        axis: (f % 2 === 0 ? 'x' : 'z'),
                        friccion: friccion 
                    };
                    
                    scene.add(mesh);
                    pisoBloques.push(mesh);
                }
                torre.push(pisoBloques);
            }

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();
            
            window.addEventListener('pointerdown', onPointerDown);
            window.addEventListener('pointermove', onPointerMove);
            window.addEventListener('pointerup', onPointerUp);
            window.addEventListener('resize', onWindowResize);
            animate();
        }

        // Esta función es para agarrar las piezas con el clic
        function onPointerDown(e) {
            if (perdido || e.button !== 0) return;
            
            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);
            
            const hits = raycaster.intersectObjects(torre.flat());
            if (hits.length > 0) {
                piezaSeleccionada = hits[0].object;
                controls.enabled = false;
                // Aqui se guarda la posicion de la pieza mientras la van jalando y la sueltan
                posicionInicialPieza.copy(piezaSeleccionada.position);
                const normal = new THREE.Vector3(0, 1, 0); 
                planoInterseccion.setFromNormalAndCoplanarPoint(normal, piezaSeleccionada.position);  
                let puntoInterseccion = new THREE.Vector3();
                raycaster.ray.intersectPlane(planoInterseccion, puntoInterseccion);              
                offsetArrastre.copy(puntoInterseccion).sub(piezaSeleccionada.position);
            }
        }

        // Esta es la función apra arrastrar las piezas mantiendo el clic con el mouse y despues arrastrando
        function onPointerMove(e) {
            if (!piezaSeleccionada || perdido) return;

            mouse.x = (e.clientX/window.innerWidth)*2-1;
            mouse.y = -(e.clientY/window.innerHeight)*2+1;
            raycaster.setFromCamera(mouse, camera);

            let puntoInterseccion = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(planoInterseccion, puntoInterseccion)) {        
                // con esta es para ver cuanto se movio la pueza de la posicion original
                const movimientoMouse = puntoInterseccion.sub(offsetArrastre);           
                if (piezaSeleccionada.userData.axis === 'x') {
                    const deltaX = movimientoMouse.x - posicionInicialPieza.x;
                    piezaSeleccionada.position.x = posicionInicialPieza.x + (deltaX * piezaSeleccionada.userData.friccion);
                } else {
                    const deltaZ = movimientoMouse.z - posicionInicialPieza.z;
                    piezaSeleccionada.position.z = posicionInicialPieza.z + (deltaZ * piezaSeleccionada.userData.friccion);
                }
                // aqui es para que se le asigne una sensibilidad dentro de un rango al azar a cada pieza, funciona entre menos sensibilidad es mas friccion
                const dist = piezaSeleccionada.userData.axis === 'x' ? 
                             Math.abs(piezaSeleccionada.position.x) : 
                             Math.abs(piezaSeleccionada.position.z);

                // 2.3 de sensibilidad para que no sea feo con piezas pesadas
                if (dist > 2.3) {
                    marcarPiezaComoFuera(piezaSeleccionada);
                }
            }
        }

        //Esta es por si llegan a soltar el mouse 
        function onPointerUp() {
            piezaSeleccionada = null;
            controls.enabled = true;
        }

        // y esta si dejan de mover la pieza
        function marcarPiezaComoFuera(obj) {
            if (!obj.userData.activo) return;
            obj.visible = false;
            obj.userData.activo = false;
            obj.position.y = -100;
            score++;
            document.getElementById('score').innerText = score;
            validarEstabilidad();
            piezaSeleccionada = null;
        }

        function validarEstabilidad() {
            for (let f = 0; f < torre.length - 1; f++) {
                const bloquesPiso = torre[f];
                const activos = bloquesPiso.filter(b => b.userData.activo).length;
                const centro = bloquesPiso[1].userData.activo;
                if (activos === 0 || (activos === 1 && !centro)) {
                    derrumbe(f);
                    break;
                }
            }
        }

        function derrumbe(pisoFalla) {
            perdido = true;
            document.getElementById('game-over').style.display = 'flex';

            torre.flat().forEach(b => {
                if (!b.userData.activo) return;

                 // Calcula una direccion de explosion desde el centro de la torre
                const dirX = b.position.x + (Math.random() - 0.5) * 10;
                const dirZ = b.position.z + (Math.random() - 0.5) * 10;
        
                // Animacion de caída
                const caidaRapida = () => {
                    if (b.position.y > -20) {
                        b.position.y -= 0.5; // Velocidad de caida
                        b.position.x += (dirX - b.position.x) * 0.05; // Se expanden hacia afuera
                        b.position.z += (dirZ - b.position.z) * 0.05;
                
                        //Para que funcione en los 3 ejes
                        b.rotation.x += 0.1;
                        b.rotation.y += 0.1;
                        b.rotation.z += 0.1;
                
                        requestAnimationFrame(caidaRapida);
                    } else {
                        b.visible = false; // Para que desaparezcan
                    }
                };
                caidaRapida();
            });
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
