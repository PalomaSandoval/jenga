<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jenga de la Calidad 3D</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div id="ui">
        <h1>Jenga de la Calidad</h1>
        <div class="legend">
            <p id="turno-display">Turno del Jugador: <span id="jugador-actual">1</span></p>
            <p>🔴 CMMI | 🟡 Moprosoft | 🔵 PSP | 🟢 TSP</p>
            <p>Piezas extraídas: <span id="score">0</span></p>
        </div>
    </div>

    <div id="modal-pregunta" class="hidden" style="display: none;">
        <div class="modal-content">
            <h2 id="tema-titulo">TEMA</h2>
            <p id="texto-pregunta">Cargando desafío...</p>
            <div id="opciones-container"></div>
        </div>
    </div>

    <div id="game-over" class="hidden" style="display: none;">
        <h1>¡TORRE COLAPSADA!</h1>
        <button onclick="location.reload()">Reiniciar</button>
    </div>

    <script type="importmap">
        { "imports": { 
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js", 
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" 
        } }
    </script>
    <script type="module" src="jenga.js"></script>
</body>
</html>
