<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Jenga de la Calidad 3D</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="setup-menu">
        <div class="modal-content">
            <h1>Jenga de la Calidad</h1>
            <p>Configuración de la partida</p>
            <label>¿Cuántos jugadores?</label>
            <input type="number" id="num-jugadores" min="2" max="4" value="2">
            <div id="inputs-nombres"></div>
            <button id="btn-comenzar">Comenzar Juego</button>
        </div>
    </div>

    <div id="panel-ruleta" style="display: none;">
        <div class="ruleta-container">
            <h2>Ruleta de Temas</h2>
            <div class="ruleta-wrapper">
                <div id="ruleta-puntero"></div>
                <canvas id="ruleta-canvas" width="250" height="250"></canvas>
            </div>
            <p id="ruleta-resultado-texto">¡Haz clic en Girar!</p>
            <button id="btn-girar" disabled>GIRAR RULETA</button>
        </div>
    </div>

    <div id="ui" style="display: none;">
        <h1>Jenga de la Calidad</h1>
        <div class="legend">
            <p id="turno-display">Jugador: <span id="jugador-actual">-</span></p>
            <p>Piezas fuera: <span id="score">0</span></p>
        </div>
    </div>

    <div id="modal-turno" style="display: none;">
        <div class="modal-content transition">
            <h2 id="anuncio-jugador">Es turno de...</h2>
        </div>
    </div>  

    <div id="modal-mensaje" style="display: none;">
        <div class="modal-content mensaje-estilo">
            <h2 id="mensaje-titulo"></h2>
            <p id="mensaje-texto"></p>
        </div>
    </div>

    <div id="modal-pregunta" style="display: none;">
        <div class="modal-content">
            <h2 id="tema-titulo">TEMA</h2>
            <p id="texto-pregunta"></p>
            <div id="opciones-container"></div>
        </div>
    </div>

    <div id="game-over" style="display: none;">
        <h1>¡TORRE COLAPSADA!</h1>
        <button onclick="location.reload()">Reiniciar</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    
    <script src="BancoPreguntas.js"></script> 
    <script src="jenga.js"></script>
</body>
</html>
